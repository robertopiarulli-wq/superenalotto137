name: Superenalotto Armonia 137 Update

on:
  schedule:
    - cron: '30 20 * * 2,4,5,6'
  workflow_dispatch: 

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essenziale per salvare i dati
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pandas supabase requests numpy beautifulsoup4 -r requirements.txt

      - name: 1. Update Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_estrazioni.py

      - name: 2. Generazione Mappa Pressione
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_pressione.py

      - name: 3. Generazione Cardini Scientifici
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_risonanza_137.py

      - name: Installa librerie scientifiche per Laboratorio Fasi
        run: |
          pip install numpy pandas scipy statsmodels supabase

      - name: Esegui Laboratorio Fasi Lineare (Isolato su 137 singoli passi)
        env:
          URL_SUPABASE: ${{ secrets.SUPABASE_URL }}
          KEY_SUPABASE: ${{ secrets.SUPABASE_KEY }}
        run: python laboratorio_segnale/motore_lineare_137.py

      - name: Sincronizzazione Unificata e Push Atomico dei Risultati
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Tracciamento preventivo di tutti i file creati o modificati dai motori
          git add mappa_valli_pressione.csv cardini_scientifici.json laboratorio_segnale/report_fasi.json
          
          # 2. Mettiamo temporaneamente al sicuro le modifiche per pulire l'albero di lavoro
          git stash
          
          # 3. Pull con rebase sicuro senza interferenze da file non committati
          git pull origin main --rebase
          
          # 4. Ripristino dei file di analisi sovrascrivendo eventuali modifiche concorrenti
          git stash pop || git checkout --theirs mappa_valli_pressione.csv cardini_scientifici.json laboratorio_segnale/report_fasi.json
          
          # 5. Nuovo staging complessivo post-sincronizzazione
          git add mappa_valli_pressione.csv cardini_scientifici.json laboratorio_segnale/report_fasi.json
          
          # 6. Esecuzione del commit unificato solo in presenza di reali variazioni dei dati
          git diff-index --quiet HEAD || git commit -m "🔬 [Automated] Aggiornamento completo Mappe, Cardini e Radiografia Imbuto 137x1"
          
          # 7. Spinta finale sicura sul server remoto
          git push origin main
