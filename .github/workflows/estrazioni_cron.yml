name: Superenalotto Armonia 137 & Pressione Update

on:
  schedule:
    - cron: '30 20 * * 2,4,5,6'
  workflow_dispatch: 

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    
    # Permessi espliciti per la scrittura
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pandas supabase requests numpy beautifulsoup4

      - name: 1. Update Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_estrazioni.py

      - name: 2. Analisi Pressione (Generazione Mappa)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_pressione.py

      - name: 3. Analisi Risonanza (Generazione Cardini)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_risonanza_137.py

      - name: 4. Esecuzione Analisi Parisi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_parisi.py

      - name: 5. Commit e Push dei risultati scientifici
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mappa_valli_pressione.csv cardini_scientifici.json
          git commit -m "Update dati scientifici: Valli e Cardini [skip ci]" || echo "Nessuna modifica da caricare"
          git push
