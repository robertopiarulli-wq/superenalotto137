name: Superenalotto Armonia 137 Update

on:
  schedule:
    - cron: '30 20 * * 2,4,5,6'
  workflow_dispatch: 

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa Dipendenze
        run: |
          pip install pandas supabase requests numpy

      - name: Esecuzione Update Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_estrazioni.py
