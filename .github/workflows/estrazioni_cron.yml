name: Superenalotto Armonia 137 & Pressione Update

on:
  schedule:
    # Esecuzione alle 20:30 UTC (circa 22:30 ora italiana) 
    # nei giorni di estrazione: Martedì, Giovedì, Venerdì, Sabato.
    - cron: '30 20 * * 2,4,5,6'
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pandas supabase requests numpy beautifulsoup4

      - name: 1. Esecuzione Update Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_estrazioni.py

      - name: 2. Esecuzione BLOCCO MOTORE 1 (Analisi Pressione)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_pressione.py

      # ... (altri step di analisi) ...

      - name: Commit e Push dei risultati
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add mappa_valli_pressione.csv
          git commit -m "Update Mappa Pressione [skip ci]" || echo "No changes to commit"
          git push

      - name: 3. Esecuzione Analisi Parisi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_parisi.py

      - name: 4. Esecuzione Analisi Risonanza 137
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_risonanza_137.py

      - name: Archiviazione Risultati (CSV)
        uses: actions/upload-artifact@v4
        with:
          name: report-analisi-superenalotto
          path: mappa_valli_pressione.csv
