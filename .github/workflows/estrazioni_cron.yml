name: Superenalotto Armonia 137 Update

on:
  schedule:
    - cron: '30 20 * * 2,4,5,6'
  workflow_dispatch: 

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essenziale per salvare i dati
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pandas supabase requests numpy beautifulsoup4 -r requirements.txt

      - name: 1. Update Database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python update_estrazioni.py

      - name: 2. Generazione Mappa Pressione
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_pressione.py

      - name: 3. Generazione Cardini Scientifici
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python analisi_risonanza_137.py

      - name: 4. Commit e Push dei risultati
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mappa_valli_pressione.csv cardini_scientifici.json
          git commit -m "Aggiornamento automatico cardini e valli [skip ci]" || echo "Nessuna modifica rilevata"
          git push

# ... (I tuoi step precedenti di estrazione e aggiornamento Supabase) ...

      - name: Installa librerie scientifiche per Laboratorio Fasi
        run: |
          pip install numpy pandas scipy statsmodels supabase

      - name: Esegui Laboratorio Fasi Lineare (Isolato su 137 singoli passi)
        env:
          URL_SUPABASE: ${{ secrets.URL_SUPABASE }}
          KEY_SUPABASE: ${{ secrets.KEY_SUPABASE }}
        run: python laboratorio_segnale/motore_lineare_137.py

      - name: Sincronizzazione e Push del Report di Analisi Segnale
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Facciamo il pull preventivo per evitare sfasamenti se Vercel o modifiche manuali hanno aggiornato il repo
          git pull origin main --rebase
          
          # Forziamo il tracciamento e il commit del SOLO file JSON generato
          git add laboratorio_segnale/report_fasi.json
          
          # Eseguiamo il commit solo se il file JSON ha subito reali variazioni statistiche
          git commit -m "🤖 [Cron] Aggiornato report_fasi.json lineare (Finestra Stretta 137)" || echo "Nessuna variazione rilevata nel segnale"
          
          git push origin main
