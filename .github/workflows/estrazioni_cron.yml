name: Superenalotto Armonia 137 Update
on:
  schedule:
    - cron: '30 20 * * 2,4,5,6'
  workflow_dispatch: 

jobs:
  build_and_run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Fondamentale per salvare i file
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install
        run: pip install pandas supabase requests numpy beautifulsoup4
      - name: Run Scripts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python update_estrazioni.py
          python analisi_pressione.py
          python analisi_risonanza_137.py
          python analisi_parisi.py
      - name: Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mappa_valli_pressione.csv cardini_scientifici.json
          git commit -m "Update dati [skip ci]" || echo "No changes"
          git push
