name: Superenalotto Data Update
on:
  schedule:
    - cron: '30 20 * * 2,4,5,6' # Ore 20:30 UTC nei giorni di estrazione
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  update_db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas supabase requests

      - name: Run Update Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_estrazioni.py
